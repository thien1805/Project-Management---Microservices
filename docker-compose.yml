services:
  postgres-auth:
    image: postgres:16
    container_name: ms_postgres_auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
    ports:
      - "${AUTH_POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./auth/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-task:
    image: postgres:16
    container_name: ms_postgres_task
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TASK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TASK_POSTGRES_PASSWORD}
      POSTGRES_DB: ${TASK_POSTGRES_DB}
    ports:
      - "${TASK_POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_task_data:/var/lib/postgresql/data
      - ./project_and_task_management/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TASK_POSTGRES_USER} -d ${TASK_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16
    container_name: ms_postgres_notification
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${NOTIFICATION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTIFICATION_POSTGRES_DB}
    ports:
      - "${NOTIFICATION_POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
      - ./notification/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_POSTGRES_USER} -d ${NOTIFICATION_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: ms_auth
    restart: unless-stopped
    environment:
      PORT: ${AUTH_SERVICE_PORT}
      DB_HOST: ${AUTH_DB_HOST}
      DB_PORT: ${AUTH_DB_PORT}
      DB_NAME: ${AUTH_DB_NAME}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      JWT_SECRET: ${AUTH_JWT_SECRET}
      JWT_EXPIRES: ${AUTH_JWT_EXPIRES}
    depends_on:
      postgres-auth:
        condition: service_healthy
    ports:
      - "${AUTH_HOST_PORT}:${AUTH_SERVICE_PORT}"

  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    container_name: ms_notification
    restart: unless-stopped
    environment:
      PORT: ${NOTIFICATION_SERVICE_PORT}
      DB_HOST: ${NOTIFICATION_DB_HOST}
      DB_PORT: ${NOTIFICATION_DB_PORT}
      DB_NAME: ${NOTIFICATION_DB_NAME}
      DB_USER: ${NOTIFICATION_DB_USER}
      DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
    depends_on:
      postgres-notification:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_HOST_PORT}:${NOTIFICATION_SERVICE_PORT}"

  project-and-task-management:
    build:
      context: ./project_and_task_management
      dockerfile: Dockerfile
    container_name: ms_project_task
    restart: unless-stopped
    environment:
      PORT: ${PROJECT_SERVICE_PORT}
      DB_HOST: ${PROJECT_DB_HOST}
      DB_PORT: ${PROJECT_DB_PORT}
      DB_NAME: ${PROJECT_DB_NAME}
      DB_USER: ${PROJECT_DB_USER}
      DB_PASSWORD: ${PROJECT_DB_PASSWORD}
      NOTIFICATION_ENABLED: ${PROJECT_NOTIFICATION_ENABLED}
      NOTIFICATION_URL: ${PROJECT_NOTIFICATION_URL}
    depends_on:
      postgres-task:
        condition: service_healthy
      notification:
        condition: service_started
    ports:
      - "${PROJECT_HOST_PORT}:${PROJECT_SERVICE_PORT}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ms_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${FRONTEND_NODE_ENV}
      NEXT_PUBLIC_AUTH_SERVICE_URL: ${FRONTEND_AUTH_SERVICE_URL}
      NEXT_PUBLIC_TASK_SERVICE_URL: ${FRONTEND_TASK_SERVICE_URL}
      NEXT_PUBLIC_NOTIFICATION_SERVICE_URL: ${FRONTEND_NOTIFICATION_SERVICE_URL}
    depends_on:
      auth:
        condition: service_started
      project-and-task-management:
        condition: service_started
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_SERVICE_PORT}"

volumes:
  postgres_auth_data:
  postgres_task_data:
  postgres_notification_data:
